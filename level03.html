</head>

<body>

<div class="scanline"></div>

<div class="topbar">
    <div>LEVEL 3: TERMINAL ACCESS</div>
    <div>TIMER: <span id="timer">120</span>s</div>
</div>

<div class="title">REMOTE TERMINAL</div>

<div class="terminal" id="terminal">
    <div>> Connection established...</div>
    <div>> Type 'help' to begin</div>
</div>

<div class="input-box">
    <div class="input-line">
        <span>> </span>
        <input type="text" id="commandInput" autofocus onkeydown="handleCommand(event)">
    </div>
</div>

<script>

const terminal = document.getElementById("terminal");

function print(text){
    terminal.innerHTML += "<div>> " + text + "</div>";
    terminal.scrollTop = terminal.scrollHeight;
}

function handleCommand(e){
    if(e.key === "Enter"){
        let cmd = document.getElementById("commandInput").value.toLowerCase();
        document.getElementById("commandInput").value = "";
        processCommand(cmd);
    }
}

function processCommand(cmd){

    if(cmd === "help"){
        print("Available commands: ls, cat secret.txt, cat logs.txt, clear, login <password>");

    } else if(cmd === "ls"){
        print("files: secret.txt, logs.txt");

    } else if(cmd === "cat secret.txt"){
        print("admin_password = root123");

    } else if(cmd === "cat logs.txt"){
        print("unauthorized login attempt detected...");

    } else if(cmd === "clear"){
        terminal.innerHTML = "";

    } else if(cmd === "login root123"){
        print("ACCESS GRANTED");

        // unlock final level
        localStorage.setItem("final_unlocked", "true");

        setTimeout(() => {
            window.location.href = "04_dashboard.html";
        }, 1500);

    } else {
        print("command not recognized");
    }
}

/* TIMER */
let time = 120;
setInterval(() => {
    time--;
    document.getElementById("timer").innerText = time;

    if(time <= 10){
        document.getElementById("timer").style.color = "red";
    }

    if(time <= 0){
        alert("TIME UP!");
        location.reload();
    }
}, 1000);

</script>

</body>
