<!DOCTYPE html>
<html>
<head>
    <title>Cyber Escape Room</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: black;
            color: #00eaff;
            font-family: 'Share Tech Mono';
            overflow: hidden;
            transition: opacity 0.4s ease;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        /* subtle grid */
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0,234,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,234,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .scanline {
            position: fixed;
            width: 100%;
            height: 2px;
            background: rgba(0,255,255,0.3);
            animation: scan 7s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .container {
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        h1 {
            font-family: Orbitron;
            font-size: 64px;
            letter-spacing: 6px;
            text-shadow: 0 0 20px #00eaff;
        }

        /* controlled glitch (not constant) */
        .glitch {
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: none; }
            92% { transform: translate(2px, -2px); }
            94% { transform: translate(-2px, 2px); }
            96% { transform: translate(1px, -1px); }
        }

        .subtitle {
            margin-top: 15px;
            font-size: 18px;
            color: #9dfcff;
            height: 25px;
        }

        button {
            margin-top: 40px;
            padding: 18px 60px;
            border: 2px solid #00eaff;
            background: transparent;
            color: #00eaff;
            cursor: pointer;
            font-family: Orbitron;
            transition: 0.3s;
            box-shadow: 0 0 15px #00eaff;
        }

        button:hover {
            background: #00eaff;
            color: black;
            transform: scale(1.07);
            box-shadow: 0 0 30px #00eaff;
        }

        /* boot screen */
        #boot {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            color: #00ff9c;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            font-size: 14px;
        }

        .skip {
            margin-top: 20px;
            border: 1px solid #00ff9c;
            padding: 6px 15px;
            cursor: pointer;
        }

        /* cursor glow */
        .cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            background: cyan;
            border-radius: 50%;
            box-shadow: 0 0 12px cyan;
            pointer-events: none;
        }
    </style>
</head>

<body>

<div id="boot">
    <div id="bootText"></div>
    <div class="skip" onclick="skipBoot()">SKIP</div>
</div>

<canvas id="matrix"></canvas>
<div class="scanline"></div>
<div class="cursor" id="cursor"></div>

<div class="container">
    <h1 id="title">CYBER ESCAPE ROOM</h1>
    <div class="subtitle" id="typing"></div>
    <button onclick="startGame()">ENTER SYSTEM</button>
</div>

<script>

/* Boot sequence */
const bootLines = [
    "Initializing system...",
    "Loading kernel...",
    "Scanning network...",
    "Decrypting modules...",
    "Access granted"
];

let b = 0;

function boot(){
    if(b < bootLines.length){
        document.getElementById("bootText").innerHTML += bootLines[b] + "<br>";
        b++;
        setTimeout(boot, 300);
    }
}

boot();
setTimeout(skipBoot, 2600);

function skipBoot(){
    document.getElementById("boot").style.display = "none";
}

/* Matrix */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00eaff";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}
setInterval(draw,40);

/* typing */
const text = "Hack. Solve. Escape.";
let i = 0;

function type(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(type,70);
    }
}
type();

/* cursor */
document.addEventListener("mousemove", e=>{
    const c = document.getElementById("cursor");
    c.style.left = e.clientX + "px";
    c.style.top = e.clientY + "px";
});

/* subtle glitch trigger */
setInterval(()=>{
    document.getElementById("title").classList.add("glitch");
    setTimeout(()=> {
        document.getElementById("title").classList.remove("glitch");
    },150);
},4000);

/* start */
function startGame(){

    // user-triggered sound (browser safe)
    const beep = new Audio("https://www.soundjay.com/buttons/sounds/button-4.mp3");
    beep.play();

    localStorage.clear();
    localStorage.setItem("levelUnlocked",1);

    document.body.style.opacity = "0";

    setTimeout(()=>{
        window.location.href="02_story.html";
    },400);
}

</script>

</body>
</html>
