<!DOCTYPE html>
<html>
<head>
    <title>Level 2 - Password Cracking</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        body {
            background: black;
            color: #00eaff;
            font-family: 'Share Tech Mono';
            margin: 0;
            transition: 0.2s;
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0,234,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,234,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .topbar {
            border-bottom: 1px solid #00eaff;
            padding: 10px;
            display: flex;
            justify-content: space-between;
        }

        .title {
            text-align: center;
            font-family: Orbitron;
            margin-top: 15px;
        }

        .container {
            width: 70%;
            margin: 20px auto;
            text-align: center;
        }

        .box {
            border: 2px solid #00eaff;
            padding: 20px;
            margin: 15px 0;
            box-shadow: 0 0 10px #00eaff;
        }

        .terminal {
            font-size: 12px;
            height: 160px;
            overflow-y: auto;
            text-align: left;
        }

        input {
            padding: 10px;
            width: 60%;
            background: black;
            border: 1px solid #00eaff;
            color: #00eaff;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 8px;
            border: 2px solid #00eaff;
            background: transparent;
            color: #00eaff;
            cursor: pointer;
        }

        button:hover {
            background: #00eaff;
            color: black;
        }

        .progress {
            height: 20px;
            border: 1px solid #00eaff;
            margin-top: 10px;
        }

        .bar {
            height: 100%;
            width: 0%;
            background: #00eaff;
        }

    </style>
</head>

<body>

<div class="topbar">
    <div>LEVEL 2: PASSWORD CRACKING</div>
    <div>TIMER: <span id="timer">120</span>s</div>
</div>

<div class="title">ADVANCED CRACKING TERMINAL</div>

<div class="container">

    <div class="box">
        <h3>Target Hash</h3>
        <p>5f4dcc3b5aa765d61d8327deb882cf99</p>
    </div>

    <div class="box">
        <button onclick="startAttack(800)">Slow Attack</button>
        <button onclick="startAttack(300)">Fast Attack</button>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>
    </div>

    <div class="box">
        <input type="text" id="manual" placeholder="Manual guess">
        <button onclick="manualTry()">Try</button>
    </div>

    <div class="box terminal" id="terminal"></div>

</div>

<script>

let wordlist = ["admin","123456","letmein","password","qwerty"];
let index = 0;
let attempts = 0;
let progress = 0;

/* terminal */
function log(text){
    let t = document.getElementById("terminal");
    t.innerHTML += "> " + text + "<br>";
    t.scrollTop = t.scrollHeight;
}

/* attack */
function startAttack(speed){

    index = 0;
    progress = 0;
    document.getElementById("bar").style.width = "0%";

    log("Starting dictionary attack...");

    function run(){

        if(index < wordlist.length){

            let word = wordlist[index];
            log("Trying: " + word);

            progress += 20;
            document.getElementById("bar").style.width = progress + "%";

            setTimeout(()=>{

                if(word === "password"){
                    success(word);
                } else {
                    log("Failed");
                    index++;
                    run();
                }

            }, speed);
        }
    }

    run();
}

/* manual */
function manualTry(){

    let val = document.getElementById("manual").value.toLowerCase();
    attempts++;

    log("Manual attempt: " + val);

    if(val === "password"){
        success(val);
    } else {

        log("Wrong attempt ("+attempts+")");

        if(attempts >= 3){
            log("System slowing due to suspicious activity...");
        }
    }
}

/* success */
function success(pass){

    log("MATCH FOUND!");
    log("Password: " + pass);

    // glitch effect
    document.body.style.background = "#022";
    setTimeout(()=>document.body.style.background="black",200);

    localStorage.setItem("levelUnlocked", 3);

    setTimeout(()=>{
        window.location.href = "04_dashboard.html";
    },1200);
}

/* boot */
log("Initializing cracking engine...");
setTimeout(()=>log("Hash type: MD5"),500);
setTimeout(()=>log("System ready"),1000);

/* timer */
let time = 120;
setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = time;

    if(time <= 0){
        alert("System Locked!");
        location.reload();
    }
},1000);

</script>

</body>
</html>
