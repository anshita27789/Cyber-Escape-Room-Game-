<!DOCTYPE html>
<html>
<head>
    <title>Mission Complete</title>

        body {

        .container {
            margin-top: 120px;

        .buttons {
            margin-top: 40px;

            padding: 12px 25px;

<body>

<div class="container">

    <h1 id="title">SYSTEM BREACH SUCCESS</h1>

    <div class="text" id="typing"></div>

    <div class="agent">
        Agent: <span id="agentName"></span>
    </div>

    <div class="buttons">
        <button onclick="restart()">RESTART</button>
        <button onclick="exitGame()">EXIT</button>
    </div>

</div>

<script>

/* agent */
let agent = localStorage.getItem("savedUser") || "UNKNOWN";
document.getElementById("agentName").innerText = agent;

/* typing effect */
let message = "All security layers bypassed... System fully compromised... You have successfully escaped.";
let i = 0;

function typeText(){
    if(i < message.length){
        document.getElementById("typing").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeText, 40);
    } else {
        shutdownEffect();
    }
}

typeText();

/* glitch flash */
function shutdownEffect(){
    setTimeout(()=>{
        document.body.style.background = "#022";
        setTimeout(()=>{
            document.body.style.background = "black";
        },200);
    },500);
}

/* restart */
function restart(){
    localStorage.clear();
    window.location.href = "03_login.html";
}

/* exit */
function exitGame(){
    alert("Session terminated.");
}

</script>

</body>
</html>
